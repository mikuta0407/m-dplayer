services:
  mtalker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        LIBDAVE_VERSION: v1.1.1
    container_name: mtalker
    restart: unless-stopped
    environment:
      # 必須: Discord Bot トークンを設定してください
      DISCORD_TOKEN: "SET_YOUR_DISCORD_BOT_TOKEN"
      # 任意: コンテナ内の実行パスを明示したい場合に設定してください
      FFMPEG_PATH: "/usr/bin/ffmpeg"
      # pip によるインストール先です
      YT_DLP_PATH: "/usr/local/bin/yt-dlp"
